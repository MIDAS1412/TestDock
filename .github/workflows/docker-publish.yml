name: Docker Publish

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE }}
  CONTAINER_PORT: 3000
  DEPLOY_SLOT: 2

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required configuration
        run: |
          if [ -z "${IMAGE_NAME}" ]; then
            echo "Missing repository variable DOCKERHUB_IMAGE"
            exit 1
          fi

          if [ "${{ github.event_name }}" != "pull_request" ] && [ -z "${{ secrets.DEPLOY_URL }}" ]; then
            echo "Missing repository secret DEPLOY_URL"
            exit 1
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master') }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DevOps Classroom
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          REPO="${IMAGE_NAME}"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${DEPLOY_URL}?repo=${REPO}&tag=latest&slot=${DEPLOY_SLOT}&container_port=${CONTAINER_PORT}&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy failed. See webhook details in the log group below."
            echo "::group::Webhook JSON details"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy succeeded."
          echo "::group::Webhook JSON details"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
