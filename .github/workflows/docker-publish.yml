name: Docker Publish

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  CONTAINER_PORT: 80
  DEPLOY_SLOT: 3

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required configuration
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
              echo "Missing repository secret DOCKERHUB_USERNAME"
              exit 1
            fi

            if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "Missing repository secret DOCKERHUB_TOKEN"
              exit 1
            fi

            if [ -z "${{ secrets.DEPLOY_URL }}" ]; then
              echo "Missing repository secret DEPLOY_URL"
              exit 1
            fi
          fi

      - name: Compute Docker image name
        id: image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          OWNER="${DOCKERHUB_USERNAME:-$REPOSITORY_OWNER}"
          OWNER_LOWER=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(printf '%s' "$REPOSITORY_NAME" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${OWNER_LOWER}/${REPO_LOWER}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Using image: ${IMAGE_NAME}"

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master') }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DevOps Classroom
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          REPO="${{ steps.image.outputs.image_name }}"
          echo "Deploying image: ${REPO}:latest to slot ${DEPLOY_SLOT} on container port ${CONTAINER_PORT}"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${DEPLOY_URL}?repo=${REPO}&tag=latest&slot=${DEPLOY_SLOT}&container_port=${CONTAINER_PORT}&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy failed. See webhook details in the log group below."
            echo "::group::Webhook JSON details"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy succeeded."
          echo "::group::Webhook JSON details"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
